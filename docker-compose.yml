# Local dev environment that mirrors production: the app + a real Postgres.
#   docker compose up --build   →   http://localhost:8080
#
# Data persists in the named volume 'pgdata' across restarts.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: cruise
      POSTGRES_PASSWORD: cruise
      POSTGRES_DB: cruise
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cruise"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    volumes:
      # Live-mount source so logo/UI edits show without rebuild (node_modules stays in image)
      - .:/app
      - /app/node_modules
    environment:
      # host 'db' is the compose service; sslmode=disable keeps SSL off for local PG
      DATABASE_URL: postgres://cruise:cruise@db:5432/cruise?sslmode=disable
      SESSION_SECRET: local-dev-session-secret
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
