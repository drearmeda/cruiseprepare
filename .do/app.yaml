# DigitalOcean App Platform spec for Cruise Prepare.
# When you create the app in DO, you can point it at this file, or just
# configure the same settings in the DO web UI. Replace the repo line.
name: cruiseprepare
region: nyc
services:
  - name: web
    github:
      repo: YOUR_GITHUB_USERNAME/cruiseprepare
      branch: main
      deploy_on_push: true
    build_command: npm install
    run_command: npm start
    environment_slug: node-js
    http_port: 8080
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: SESSION_SECRET
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_WITH_LONG_RANDOM_SECRET
databases:
  - name: db
    engine: PG
    version: "16"
    production: false
